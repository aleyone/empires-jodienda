<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contraseña – Mini Kripta · Empires &amp; Jodienda</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16.png">
  <link rel="apple-touch-icon" href="/img/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#c9952a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mini Kripta">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <span class="brand-mini">⚔ Empires &amp; Jodienda ⚔</span>
      <div class="brand-name">Mini <span>Kripta</span></div>
      <div class="login-divider"></div>
      <p class="text-muted text-sm">Restablecer contraseña</p>
    </div>

    <!-- Estado: token inválido -->
    <div id="state-invalid" class="hidden text-center">
      <p style="font-size:2rem;margin-bottom:1rem;">⚠️</p>
      <p class="text-secondary" style="font-size:0.9rem;">
        Este enlace no es válido o ha caducado.<br>
        Solicita uno nuevo desde el login.
      </p>
      <a href="login.html" class="btn btn-primary btn-full mt-3">Volver al login</a>
    </div>

    <!-- Formulario -->
    <form id="reset-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="new-pass">Nueva contraseña <span class="required">*</span></label>
        <input class="form-control" type="password" id="new-pass" placeholder="mínimo 6 caracteres" required>
        <span class="form-error" id="err-new-pass"></span>
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm-pass">Confirmar contraseña <span class="required">*</span></label>
        <input class="form-control" type="password" id="confirm-pass" placeholder="repite la contraseña" required>
        <span class="form-error" id="err-confirm"></span>
      </div>
      <button type="submit" class="btn btn-primary btn-full mt-1" id="reset-btn">
        Guardar nueva contraseña
      </button>
    </form>

    <div id="state-ok" class="hidden text-center mt-2">
      <p style="font-size:2rem;margin-bottom:0.5rem;">✅</p>
      <p class="text-secondary" style="font-size:0.9rem;">Contraseña cambiada correctamente.</p>
      <a href="login.html" class="btn btn-primary btn-full mt-3">Ir al login</a>
    </div>

  </div>
</div>

<div id="toast-container"></div>

<script src="js/utils.js"></script>
<script>
  const params   = new URLSearchParams(window.location.search);
  const token    = params.get('token');
  const username = params.get('user');

  /* Validación mínima de parámetros */
  if (!token || !username) {
    document.getElementById('reset-form').classList.add('hidden');
    document.getElementById('state-invalid').classList.remove('hidden');
  }

  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.querySelectorAll('.form-error').forEach(el => {
      el.textContent = ''; el.classList.remove('visible');
    });

    const newPass     = document.getElementById('new-pass').value;
    const confirmPass = document.getElementById('confirm-pass').value;

    if (newPass.length < 6) {
      const el = document.getElementById('err-new-pass');
      el.textContent = 'Mínimo 6 caracteres'; el.classList.add('visible');
      return;
    }
    if (newPass !== confirmPass) {
      const el = document.getElementById('err-confirm');
      el.textContent = 'Las contraseñas no coinciden'; el.classList.add('visible');
      return;
    }

    const btn = document.getElementById('reset-btn');
    btn.disabled    = true;
    btn.textContent = 'Guardando...';

    try {
      const res = await fetch('/api/users/reset-password-token', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ username, token, newPassword: newPass })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        showToast(err.error || 'Error al restablecer', 'error');
        btn.disabled    = false;
        btn.textContent = 'Guardar nueva contraseña';
        return;
      }

      document.getElementById('reset-form').classList.add('hidden');
      document.getElementById('state-ok').classList.remove('hidden');

    } catch {
      showToast('Error de conexión', 'error');
      btn.disabled    = false;
      btn.textContent = 'Guardar nueva contraseña';
    }
  });
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
