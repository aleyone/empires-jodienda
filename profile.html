<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi perfil – Mini Kripta · Empires &amp; Puzzles</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16.png">
  <link rel="apple-touch-icon" href="/img/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#c9952a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mini Kripta">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="page-wrapper">

  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="index.html" style="text-decoration:none;display:flex;flex-direction:row;align-items:center;gap:0.6rem;">
        <img src="/img/logo-48.png" alt="Mini Kripta" style="width:32px;height:32px;object-fit:contain;flex-shrink:0;display:block;">
        <span style="font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:2px;color:var(--gold);text-transform:uppercase;white-space:nowrap;">Empires &amp; Puzzles</span>
        <span style="color:var(--text-muted);font-size:0.7rem;">·</span>
        <span style="font-family:'Cinzel',serif;font-size:1rem;font-weight:700;color:var(--text-primary);white-space:nowrap;">Mini <span style="color:var(--gold);">Kripta</span></span>
      </a>
      <div class="navbar-actions">
        <a href="index.html" class="btn btn-ghost btn-sm">← Volver</a>
        <!-- Campana notificaciones -->
        <div style="position:relative;" id="notif-wrap">
          <button class="notif-btn" id="notif-btn" title="Notificaciones">
            🔔
            <span class="notif-badge" id="notif-badge"></span>
          </button>
          <div class="notif-dropdown" id="notif-dropdown">
            <div class="notif-dropdown-header">
              <a href="notifications.html" style="color:var(--gold);text-decoration:none;">Notificaciones</a>
              <button id="notif-mark-all" style="background:none;border:none;color:var(--text-muted);font-size:0.75rem;cursor:pointer;font-family:'Nunito',sans-serif;">Marcar todas leídas</button>
            </div>
            <div id="notif-list"></div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main>
    <div class="container" style="max-width:520px;">

      <!-- CABECERA PERFIL -->
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:2rem;padding:1.25rem;background:var(--bg-card);border:1px solid var(--border-gold);border-radius:var(--radius-lg);">
        <div class="user-avatar" id="profile-avatar" style="width:56px;height:56px;font-size:1.5rem;flex-shrink:0;">?</div>
        <div>
          <div style="font-family:'Cinzel',serif;font-size:1.1rem;font-weight:600;" id="profile-name"></div>
          <div class="text-muted text-sm" id="profile-role"></div>
          <div class="text-secondary text-sm" id="profile-email" style="margin-top:2px;"></div>
        </div>
      </div>

      <!-- DATOS DE ACCESO -->
      <div class="section-header mb-2">
        <span class="section-title">👤 Datos de acceso</span>
      </div>

      <form id="profile-form" novalidate style="margin-bottom:2rem;">
        <div class="form-group">
          <label class="form-label" for="p-username">Nombre de usuario</label>
          <input class="form-control" type="text" id="p-username" placeholder="nombre de usuario">
          <span class="form-hint">Solo letras, números y guion bajo. Sin espacios.</span>
          <span class="form-error" id="err-p-username"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="p-email">Email</label>
          <input class="form-control" type="email" id="p-email" placeholder="correo@ejemplo.com">
          <span class="form-error" id="err-p-email"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="save-profile-btn">
          Guardar cambios
        </button>
      </form>

      <!-- CAMBIAR CONTRASEÑA -->
      <div class="section-header mb-2">
        <span class="section-title">🔑 Cambiar contraseña</span>
      </div>

      <form id="change-pass-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="current-pass">Contraseña actual <span class="required">*</span></label>
          <input class="form-control" type="password" id="current-pass" required>
          <span class="form-error" id="err-current"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="new-pass">Nueva contraseña <span class="required">*</span></label>
          <input class="form-control" type="password" id="new-pass" placeholder="mínimo 6 caracteres" required>
          <span class="form-error" id="err-new"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm-pass">Confirmar contraseña <span class="required">*</span></label>
          <input class="form-control" type="password" id="confirm-pass" required>
          <span class="form-error" id="err-confirm"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="save-pass-btn">
          Guardar contraseña
        </button>
      </form>

    </div>
  </main>
</div>

<div id="toast-container"></div>

<script src="js/notifications.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script>
  Auth.requireAuth();
  const session = Auth.getSession();

  const ROLE_LABELS = { admin: '👑 Administrador', editor: '✏️ Editor', consultant: '👁 Consultor' };

  /* Rellenar cabecera y formulario */
  document.getElementById('profile-avatar').textContent = session.username.charAt(0).toUpperCase();
  document.getElementById('profile-name').textContent   = session.username;
  document.getElementById('profile-role').textContent   = ROLE_LABELS[session.role] || session.role;
  document.getElementById('profile-email').textContent  = session.email || 'Sin email registrado';
  document.getElementById('p-username').value           = session.username;
  document.getElementById('p-email').value              = session.email || '';

  /* ---- GUARDAR DATOS DE ACCESO ---- */
  document.getElementById('profile-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErrors();

    const newUsername = document.getElementById('p-username').value.trim().toLowerCase();
    const newEmail    = document.getElementById('p-email').value.trim();

    if (!newUsername) return showErr('err-p-username', 'El usuario no puede estar vacío');
    if (!/^[a-z0-9_]+$/.test(newUsername)) return showErr('err-p-username', 'Solo letras, números y guion bajo');
    if (newEmail && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(newEmail)) return showErr('err-p-email', 'Email no válido');

    const btn = document.getElementById('save-profile-btn');
    btn.disabled = true; btn.textContent = 'Guardando...';

    try {
      const res = await fetch(`/api/users/${session.username}`, {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json', 'x-username': session.username },
        body:    JSON.stringify({ username: newUsername, email: newEmail })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        return showErr('err-p-username', err.error || 'Error al guardar');
      }

      /* Actualizar sesión con nuevos datos */
      Auth.setSession({ ...session, username: newUsername, email: newEmail });
      document.getElementById('profile-avatar').textContent = newUsername.charAt(0).toUpperCase();
      document.getElementById('profile-name').textContent   = newUsername;
      document.getElementById('profile-email').textContent  = newEmail || 'Sin email registrado';
      showToast('Datos actualizados correctamente', 'success');

    } catch {
      showToast('Error de conexión', 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Guardar cambios';
    }
  });

  /* ---- CAMBIAR CONTRASEÑA ---- */
  document.getElementById('change-pass-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErrors();

    const currentPass = document.getElementById('current-pass').value;
    const newPass     = document.getElementById('new-pass').value;
    const confirmPass = document.getElementById('confirm-pass').value;

    if (!currentPass) return showErr('err-current', 'Introduce tu contraseña actual');
    if (newPass.length < 6) return showErr('err-new', 'Mínimo 6 caracteres');
    if (newPass !== confirmPass) return showErr('err-confirm', 'Las contraseñas no coinciden');

    const btn = document.getElementById('save-pass-btn');
    btn.disabled = true; btn.textContent = 'Guardando...';

    try {
      const res = await fetch('/api/users/change-password', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'x-username': session.username },
        body:    JSON.stringify({ currentPassword: currentPass, newPassword: newPass })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        return showErr('err-current', err.error || 'Error al cambiar contraseña');
      }

      showToast('Contraseña cambiada correctamente', 'success');
      e.target.reset();

    } catch {
      showToast('Error de conexión', 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Guardar contraseña';
    }
  });

  function showErr(id, msg) {
    const el = document.getElementById(id);
    if (el) { el.textContent = msg; el.classList.add('visible'); }
  }
  function clearErrors() {
    document.querySelectorAll('.form-error').forEach(e => { e.textContent = ''; e.classList.remove('visible'); });
  }
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
