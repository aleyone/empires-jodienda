<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Equipo – Mini Kripta · Empires &amp; Puzzles</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/img/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#c9952a">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="page-wrapper">
  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="alliance.html" style="text-decoration:none;display:flex;flex-direction:row;align-items:center;gap:0.6rem;">
        <img src="/img/logo-48.png" alt="Mini Kripta" style="width:32px;height:32px;object-fit:contain;flex-shrink:0;display:block;">
        <span style="font-family:'Cinzel',serif;font-size:0.85rem;letter-spacing:2px;color:var(--gold);text-transform:uppercase;white-space:nowrap;">Empires &amp; Puzzles</span>
        <span style="color:var(--text-muted);font-size:0.7rem;">·</span>
        <span style="font-family:'Cinzel',serif;font-size:1rem;font-weight:700;color:var(--text-primary);white-space:nowrap;">Mini <span style="color:var(--gold);">Kripta</span></span>
        <span id="app-version-nav" style="font-size:0.62rem;color:var(--text-muted);letter-spacing:0.5px;white-space:nowrap;margin-left:0.1rem;"></span>
      </a>
      <div class="navbar-actions">
        <a href="alliance.html" class="btn btn-ghost btn-sm">← La Alianza</a>
        <div style="position:relative;">
          <button id="nav-menu-btn" class="btn btn-ghost btn-sm flex items-center gap-1" style="padding:0.35rem 0.6rem;">
            <div class="user-avatar" id="nav-avatar">?</div>
            <span id="nav-username" style="font-size:0.82rem;"></span>
            <span style="font-size:0.6rem;color:var(--text-muted);">▼</span>
          </button>
          <div class="navbar-menu" id="navbar-menu">
            <a href="profile.html">Mi perfil</a>
            <a href="my-team.html" id="menu-my-team">⚔ Mi equipo</a>
            <a href="admin.html" id="menu-admin" style="display:none;">Gestión usuarios</a>
            <button id="btn-logout">Cerrar sesión</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main>
    <div class="container" style="max-width:600px;">

      <div class="section-header mb-3">
        <span class="section-title" id="team-title">⚔ Mi Equipo</span>
      </div>
      <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:1.5rem;">
        Hasta 5 héroes. Pulsa un slot para añadir o cambiar un héroe.
      </p>

      <!-- SLOTS DEL EQUIPO -->
      <div id="team-slots" style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:2rem;"></div>

    </div>
  </main>
</div>

<!-- MODAL: Añadir héroe al equipo -->
<div id="modal-add-hero" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:500;overflow-y:auto;padding:1rem;box-sizing:border-box;">
  <div style="background:var(--bg-card);border:1px solid var(--border-gold);border-radius:16px;width:100%;max-width:480px;padding:1.75rem;margin:0 auto;box-sizing:border-box;">
    <div class="modal-title">⚔ Añadir héroe — Posición <span id="modal-position-label"></span></div>

    <!-- Nombre + búsqueda wiki -->
    <div class="form-group">
      <label class="form-label">Nombre del héroe <span class="required">*</span></label>
      <input class="form-control" type="text" id="team-hero-name" placeholder="Ej: Kage, Cobalt, Frigg...">
      <div id="team-wiki-status" style="font-size:0.78rem;margin-top:0.3rem;color:var(--text-muted);display:none;"></div>
    </div>

    <!-- Preview del héroe encontrado -->
    <div id="team-hero-preview" style="display:none;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:0.85rem;margin-bottom:1rem;display:none;">
      <div style="display:flex;align-items:center;gap:0.75rem;">
        <div id="team-preview-img-wrap" style="width:48px;height:60px;background:var(--bg-card);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;">⚔</div>
        <div>
          <div style="font-weight:700;font-size:0.9rem;" id="team-preview-name"></div>
          <div style="font-size:0.78rem;color:var(--text-muted);" id="team-preview-meta"></div>
        </div>
      </div>
    </div>

    <!-- Campos manuales (si no se encontró en wiki) -->
    <div id="team-manual-fields" style="display:none;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
        <div class="form-group">
          <label class="form-label">Elemento</label>
          <select class="form-control" id="team-hero-element">
            <option value="">Seleccionar</option>
            <option value="fire">🔥 Fuego</option>
            <option value="ice">❄️ Hielo</option>
            <option value="nature">🌿 Naturaleza</option>
            <option value="dark">💜 Oscuridad</option>
            <option value="holy">✨ Sagrado</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Rareza</label>
          <select class="form-control" id="team-hero-rarity">
            <option value="">Seleccionar</option>
            <option value="3">⭐⭐⭐ Raro</option>
            <option value="4">⭐⭐⭐⭐ Épico</option>
            <option value="5">⭐⭐⭐⭐⭐ Legendario</option>
          </select>
        </div>
      </div>
      <!-- Upload imagen -->
      <div class="form-group">
        <label class="form-label">Imagen <span style="color:var(--text-muted);font-size:0.78rem;">(opcional)</span></label>
        <div id="team-img-preview-wrap" style="width:80px;height:100px;background:var(--bg-surface);border:1px dashed var(--border-subtle);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:0.5rem;" onclick="document.getElementById('team-img-input').click()">
          <img id="team-img-preview" src="" style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius-md);display:none;">
          <span id="team-img-placeholder" style="font-size:1.5rem;">📷</span>
        </div>
        <input type="file" id="team-img-input" accept="image/*" style="display:none;">
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:0.5rem;margin-top:1rem;">
      <button class="btn btn-primary w-full" id="team-save-hero-btn">⚔ Añadir al equipo</button>
      <button class="btn btn-ghost w-full" id="team-cancel-btn">Cancelar</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/changelog.js"></script>
<script src="js/notifications.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/heroes.js"></script>
<script src="js/my-team.js"></script>
</body>
</html>
