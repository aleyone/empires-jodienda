<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Alianza – Mini Kripta · Empires &amp; Puzzles</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/img/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#c9952a">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="page-wrapper">
  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="index.html" style="text-decoration:none;display:flex;flex-direction:row;align-items:center;gap:0.6rem;">
        <img src="/img/logo-48.png" alt="Mini Kripta" style="width:32px;height:32px;object-fit:contain;flex-shrink:0;display:block;">
        <span style="font-family:'Cinzel',serif;font-size:0.85rem;letter-spacing:2px;color:var(--gold);text-transform:uppercase;white-space:nowrap;">Empires &amp; Puzzles</span>
        <span style="color:var(--text-muted);font-size:0.7rem;">·</span>
        <span style="font-family:'Cinzel',serif;font-size:1rem;font-weight:700;color:var(--text-primary);white-space:nowrap;">Mini <span style="color:var(--gold);">Kripta</span></span>
        <span id="app-version-nav" style="font-size:0.62rem;color:var(--text-muted);letter-spacing:0.5px;white-space:nowrap;margin-left:0.1rem;"></span>
      </a>
      <div class="navbar-actions">
        <a href="index.html" class="btn btn-ghost btn-sm">← Volver</a>
        <div style="position:relative;" id="notif-wrap">
          <button class="notif-btn" id="notif-btn" title="Notificaciones">🔔<span class="notif-badge" id="notif-badge"></span></button>
          <div class="notif-dropdown" id="notif-dropdown">
            <div class="notif-dropdown-header">
              <a href="notifications.html" style="color:var(--gold);text-decoration:none;">Notificaciones</a>
              <button id="notif-mark-all" style="background:none;border:none;color:var(--text-muted);font-size:0.75rem;cursor:pointer;font-family:'Nunito',sans-serif;">Marcar todas leídas</button>
            </div>
            <div id="notif-list"></div>
          </div>
        </div>
        <div style="position:relative;">
          <button id="nav-menu-btn" class="btn btn-ghost btn-sm flex items-center gap-1" style="padding:0.35rem 0.6rem;">
            <div class="user-avatar" id="nav-avatar">?</div>
            <span id="nav-username" style="font-size:0.82rem;"></span>
            <span style="font-size:0.6rem;color:var(--text-muted);">▼</span>
          </button>
          <div class="navbar-menu" id="navbar-menu">
            <a href="profile.html">Mi perfil</a>
            <a href="my-team.html" id="menu-my-team" style="display:none;">⚔ Mi equipo</a>
            <a href="admin.html" id="menu-admin" style="display:none;">Gestión usuarios</a>
            <button id="btn-logout">Cerrar sesión</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">
      <div class="section-header mb-3">
        <span class="section-title">⚔ La Alianza</span>
      </div>

      <div id="alliance-loading" class="empty-state">
        <span class="empty-state-icon">⏳</span>
        <p class="empty-state-title">Cargando...</p>
      </div>

      <div id="alliance-grid" style="display:none;"></div>
    </div>
  </main>
</div>

<div id="toast-container"></div>
<script src="js/changelog.js"></script>
<script src="js/notifications.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/alliance.js"></script>
</body>
</html>
