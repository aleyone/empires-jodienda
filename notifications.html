<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notificaciones – Mini Kripta · Empires &amp; Puzzles</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png">
  <link rel="apple-touch-icon" href="/img/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#c9952a">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="page-wrapper">

  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="index.html" style="text-decoration:none;display:flex;flex-direction:row;align-items:center;gap:0.6rem;">
        <img src="/img/logo-48.png" alt="Mini Kripta" style="width:32px;height:32px;object-fit:contain;flex-shrink:0;display:block;">
        <span class="navbar-brand-ep" style="font-family:'Cinzel',serif;font-size:0.85rem;letter-spacing:2px;color:var(--gold);text-transform:uppercase;white-space:nowrap;">Empires &amp; Puzzles</span>
        <span class="navbar-brand-sep" style="color:var(--text-muted);font-size:0.7rem;">·</span>
        <span style="font-family:'Cinzel',serif;font-size:1rem;font-weight:700;color:var(--text-primary);white-space:nowrap;">Mini <span style="color:var(--gold);">Kripta</span></span>
        <span id="app-version-nav" class="navbar-brand-version" style="font-size:0.62rem;color:var(--text-muted);letter-spacing:0.5px;white-space:nowrap;margin-left:0.1rem;"></span>
      </a>
      <div class="navbar-actions">
        <a href="index.html" class="btn btn-ghost btn-sm">← Volver</a>
        <div style="position:relative;">
          <button id="nav-menu-btn" class="btn btn-ghost btn-sm flex items-center gap-1" style="padding:0.35rem 0.6rem;">
            <div class="user-avatar" id="nav-avatar">?</div>
            <span id="nav-username" style="font-size:0.82rem;"></span>
            <span style="font-size:0.6rem;color:var(--text-muted);">▼</span>
          </button>
          <div class="navbar-menu" id="navbar-menu">
            <a href="profile.html">Mi perfil</a>
            <a href="my-team.html" id="menu-my-team" style="display:none;">⚔ Mi equipo</a>
            <a href="admin.html" id="menu-admin" style="display:none;">Gestión usuarios</a>
            <button id="btn-logout">Cerrar sesión</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main>
    <div class="container" style="max-width:760px;">

      <div class="section-header mb-3">
        <span class="section-title">🔔 Notificaciones</span>
        <button class="btn btn-ghost btn-sm" id="mark-all-btn">Marcar todas leídas</button>
      </div>

      <div id="notif-loading" class="empty-state">
        <span class="empty-state-icon">⏳</span>
        <p class="empty-state-title">Cargando...</p>
      </div>

      <div id="notif-empty" class="empty-state hidden">
        <span class="empty-state-icon">🔔</span>
        <p class="empty-state-title">Sin notificaciones</p>
        <p class="empty-state-text">Todo está al día por aquí.</p>
      </div>

      <div id="notif-list" class="hidden" style="display:flex;flex-direction:column;gap:1rem;"></div>

    </div>
  </main>
</div>

<!-- MODAL: Tabla comparativa (reutilizada de hero-detail) -->
<div id="modal-wiki-compare" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;overflow-y:auto;padding:1rem;box-sizing:border-box;">
  <div style="background:var(--bg-card);border:1px solid var(--border-gold);border-radius:16px;width:100%;max-width:600px;padding:1.75rem;margin:0 auto;box-sizing:border-box;">
    <div class="modal-title">⚔ Comparar datos — <span id="compare-hero-name"></span></div>
    <p style="font-size:0.82rem;color:var(--text-secondary);margin-bottom:1.25rem;line-height:1.6;">
      Marca los campos que quieras actualizar con los datos de la wiki.
    </p>
    <div id="compare-table" style="display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1.5rem;"></div>
    <div style="display:flex;flex-direction:column;gap:0.5rem;">
      <button class="btn btn-primary w-full" id="wiki-apply-btn">✓ Actualizar campos seleccionados</button>
      <button class="btn btn-ghost w-full" id="wiki-compare-cancel">Cancelar</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="js/notifications.js"></script>
<script src="js/changelog.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/heroes.js"></script>
<script src="js/notifications-page.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
