<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Kripta · Empires &amp; Jodienda</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16.png">
  <link rel="apple-touch-icon" href="/img/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#c9952a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mini Kripta">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="page-wrapper">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="index.html" class="navbar-brand" style="text-decoration:none;display:flex;align-items:center;gap:0.6rem;">
        <img src="/img/logo-48.png" alt="Mini Kripta" style="width:38px;height:38px;object-fit:contain;flex-shrink:0;">
        <div>
          <span class="brand-mini">⚔ Empires &amp; Jodienda</span>
          <span class="brand-name">Mini <span>Kripta</span></span>
        </div>
      </a>
      <div class="navbar-actions">
        <!-- Solo admin/editor -->
        <a href="hero-new.html" class="btn btn-primary btn-sm" id="btn-add-hero" style="display:none;">
          + Héroe
        </a>
        <!-- Avatar / menú -->
        <div style="position:relative;">
          <button id="nav-menu-btn" class="btn btn-ghost btn-sm flex items-center gap-1" style="padding:0.35rem 0.6rem;">
            <div class="user-avatar" id="nav-avatar">?</div>
            <span id="nav-username" style="font-size:0.82rem;"></span>
            <span style="font-size:0.6rem;color:var(--text-muted);">▼</span>
          </button>
          <div class="navbar-menu" id="navbar-menu">
            <a href="profile.html">Mi perfil</a>
            <a href="admin.html" id="menu-admin" style="display:none;">Gestión usuarios</a>
            <button id="btn-logout">Cerrar sesión</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">

      <!-- CABECERA -->
      <div style="margin-bottom:1.5rem;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;">
        <div>
          <h1 style="margin-bottom:0.25rem;">
            <span style="color:var(--gold);">⚔</span> El Bestiario
          </h1>
          <p class="text-secondary text-sm">Los infames que nos han hecho sufrir</p>
        </div>
        <div style="background:var(--bg-card);border:1px solid var(--border-gold);border-radius:var(--radius-md);padding:0.4rem 0.9rem;text-align:center;">
          <div style="font-family:'Cinzel',serif;font-size:1.3rem;font-weight:700;color:var(--gold);line-height:1;" id="total-count">—</div>
          <div style="font-size:0.65rem;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;">Infames</div>
        </div>
      </div>

      <!-- TOOLBAR: filtros y ordenación -->
      <div class="toolbar">
        <div class="toolbar-row flex-1" style="flex-wrap:wrap;gap:0.4rem;align-items:center;">
          <span class="toolbar-label">Elemento:</span>
          <button class="filter-chip active" data-filter="element" data-value="all">Todos</button>
          <button class="filter-chip fire"   data-filter="element" data-value="fire">🔥 Fuego</button>
          <button class="filter-chip ice"    data-filter="element" data-value="ice">❄️ Hielo</button>
          <button class="filter-chip nature" data-filter="element" data-value="nature">🌿 Naturaleza</button>
          <button class="filter-chip dark"   data-filter="element" data-value="dark">💜 Oscuridad</button>
          <button class="filter-chip holy"   data-filter="element" data-value="holy">✨ Sagrado</button>
        </div>
        <div class="toolbar-row" style="gap:0.4rem;align-items:center;flex-wrap:wrap;">
          <span class="toolbar-label">Familia:</span>
          <select class="form-control" id="filter-family" style="width:auto;font-size:0.82rem;padding:5px 2rem 5px 10px;">
            <option value="all">Todas</option>
          </select>
          <span class="toolbar-label" style="margin-left:0.25rem;">Ordenar:</span>
          <select class="form-control" id="sort-by" style="width:auto;font-size:0.82rem;padding:5px 2rem 5px 10px;">
            <option value="newest">Más recientes</option>
            <option value="hardest">Más jodidos</option>
            <option value="easiest">Menos jodidos</option>
            <option value="coolest">Más molones</option>
            <option value="lamest">Menos molones</option>
            <option value="name">Nombre A-Z</option>
          </select>
        </div>
      </div>

      <!-- BÚSQUEDA -->
      <div style="margin-bottom:1.25rem;">
        <input class="form-control" type="search" id="search-input"
               placeholder="🔍 Buscar héroe por nombre..."
               style="max-width:320px;">
      </div>

      <!-- CONTEO -->
      <div class="flex items-center justify-between mb-2">
        <span class="text-muted text-sm" id="hero-count">Cargando...</span>
      </div>

      <!-- GRID DE HÉROES -->
      <div class="heroes-grid" id="heroes-grid">
        <!-- Se rellena con JS -->
      </div>

      <!-- EMPTY STATE -->
      <div class="empty-state hidden" id="empty-state">
        <span class="empty-state-icon">🐉</span>
        <p class="empty-state-title">No hay héroes aquí</p>
        <p class="empty-state-text">Aún no se ha registrado ningún infame con esos filtros.</p>
      </div>

    </div>
  </main>

</div>

<div id="toast-container"></div>

<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/heroes.js"></script>
<script src="js/index.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
